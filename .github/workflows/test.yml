name: Run Laravel Tests

on:
  # اجرای تست‌ها به صورت خودکار هر یک ساعت
  schedule:
    - cron: '0 * * * *'  # هر یک ساعت (00:00، 01:00، 02:00 و...)

  # اجرای تست‌ها هنگام push به شاخه‌ی main یا pull request
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, ctype, json, bcmath, tokenizer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
        continue-on-error: true  # ادامه می‌دهد حتی اگر تست‌ها fail شوند

  # ارسال نوتیفیکیشن به ایمیل در صورت شکست تست‌ها
  notifications:
    email:
      on_failure: always

  notify_slack:
    runs-on: ubuntu-latest
    if: failure()  # اجرا فقط در صورت شکست تست‌ها
    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.18.0
        with:
          payload: |
            {
              "text": "Laravel Tests have failed!",
              "attachments": [
                {
                  "color": "danger",
                  "text": "Please check the test results in GitHub Actions."
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}  # استفاده از Slack Webhook
