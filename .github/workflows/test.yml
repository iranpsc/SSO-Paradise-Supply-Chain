name: Run Tests Every Hour

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: sso
          MYSQL_USER: root
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, dom, gd, pdo_mysql

      - name: Install dependencies
        run: composer install

      - name: Copy .env file
        run: cp .env.example .env

      - name: Wait for MariaDB to be ready
        run: sleep 60

      - name: Configure database
        run: |
          php artisan key:generate
          php artisan migrate --force

      - name: Run tests
        run: php artisan test

      - name: MySQL Logs
        if: failure()
        run: docker logs $(docker ps -q --filter "name=mariadb")

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: storage/logs
