name: Run Tests Every Hour

# تنظیم اجرای هر یک ساعت
on:
  schedule:
    - cron: '0 * * * *'  # اجرای هر ساعت
  workflow_dispatch:  # امکان اجرای دستی

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.5  # استفاده از MariaDB 10.5
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: sso
          MYSQL_USER: root
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10  # تعداد بیشتری تلاش برای بررسی سلامت سرویس

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'  # استفاده از PHP 8.1
          extensions: mbstring, dom, gd, pdo_mysql  # اکستنشن‌های مورد نیاز

      - name: Install dependencies
        run: composer install

      - name: Copy .env file
        run: cp .env.example .env  # کپی کردن فایل env

      - name: Wait for MariaDB to be ready
        run: sleep 60  # 60 ثانیه صبر کنید تا MariaDB کامل راه‌اندازی شود

      - name: Configure database
        run: |
          php artisan key:generate
          php artisan migrate --force  # اجرای migration برای ساخت جدول‌ها

      - name: Run tests
        run: php artisan test

      - name: MySQL Logs
        if: failure()  # در صورت بروز خطا، لاگ‌های MySQL چاپ می‌شود
        run: docker logs $(docker ps -q --filter name=github_network_c45cc3d0885f47979bf062a30d64fa86)

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: storage/logs
